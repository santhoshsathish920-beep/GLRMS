{% extends 'lands/base.html' %}
{% load crispy_forms_tags %}
{% block content %}
<div class="d-flex justify-content-between align-items-center mb-3">
    <h4 class="mb-0 text-primary fw-bold"><i class="fa-solid fa-pen-to-square me-2"></i> {{ title }}</h4>
    <a href="javascript:history.back()" class="btn btn-sm btn-outline-secondary">Cancel</a>
</div>

<div class="row">
    <div class="col-md-12">
        <div class="card shadow-sm border-0">
            <div class="card-body">
                {% crispy form %}
            </div>
        </div>
    </div>
</div>
{% endblock %}
